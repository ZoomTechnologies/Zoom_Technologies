<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1111"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055FF"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Éclair bolt -->
  <text x="64" y="66" font-family="Arial" font-size="35"
        fill="url(#bolt)" text-anchor="middle" dominant-baseline="middle">⚡</text>
  <!-- ZOOM text -->
  <text x="64" y="97" font-family="Arial Black, Arial" font-size="16"
        fill="white" text-anchor="middle" font-weight="900" letter-spacing="2">ZOOM</text>
</svg>