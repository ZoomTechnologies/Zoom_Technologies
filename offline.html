<!DOCTYPE html>

      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:20px;
      color:white;
    }
    .box{
      text-align:center;
      max-width:380px;
      animation: fadeIn .5s ease;
    }
    @keyframes fadeIn{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .icon{
      font-size:5rem;
      margin-bottom:20px;
      display:block;
      filter:drop-shadow(0 4px 20px rgba(0,85,255,.4));
    }
    h1{ font-size:1.6rem; font-weight:900; margin-bottom:10px; letter-spacing:-.5px; }
    p{ color:rgba(255,255,255,.65); font-size:.9rem; line-height:1.6; margin-bottom:24px; }
    .logo-name{
      font-size:1.1rem; font-weight:900; letter-spacing:2px;
      background: linear-gradient(90deg,#0055FF,#FF6B00);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:6px;
    }
    .btn{
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 24px;
      background:linear-gradient(135deg,#0055FF,#003DC0);
      color:white; border:none; border-radius:10px;
      font-family:inherit; font-size:.88rem; font-weight:800;
      cursor:pointer; text-decoration:none;
      box-shadow:0 4px 16px rgba(0,85,255,.4);
      transition:all .18s;
    }
    .btn:hover{ transform:translateY(-2px); box-shadow:0 6px 22px rgba(0,85,255,.5); }
    .wa-btn{
      background:linear-gradient(135deg,#25D366,#128C7E);
      box-shadow:0 4px 16px rgba(37,211,102,.3);
      margin-left:8px;
    }
    .wa-btn:hover{ box-shadow:0 6px 22px rgba(37,211,102,.45); }
    .hint{ font-size:.72rem; color:rgba(255,255,255,.35); margin-top:20px; }
